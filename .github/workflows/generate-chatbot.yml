name: Generate chatbot project

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: Optional theme slug, for example robot-gardener or biotech-notes
        required: false
        type: string
      model:
        description: Optional Ollama model, for example llama3.2:1b
        required: false
        default: llama3.2:1b
        type: string

permissions:
  contents: write

concurrency:
  group: chatbot-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Ollama did not become ready; generator will fall back to templates."
        continue-on-error: true

      - name: Pull small Ollama model
        env:
          OLLAMA_MODEL_INPUT: ${{ inputs.model }}
        run: |
          MODEL="${OLLAMA_MODEL_INPUT:-llama3.2:1b}"
          ollama pull "$MODEL"
        continue-on-error: true

      - name: Generate chatbot
        env:
          CHATBOT_THEME: ${{ inputs.theme }}
          OLLAMA_URL: http://127.0.0.1:11434
          OLLAMA_MODEL: ${{ inputs.model || 'llama3.2:1b' }}
        run: python tools/chatbot_factory/generate.py

      - name: Commit generated project
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add generated chatbot project
          file_pattern: ai-chatbots/**
