<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Gardener Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="chat-panel" aria-label="Robot Gardener Chatbot">
      <header class="chat-header"><div><p>Greenhouse console</p><h1>Robot Gardener</h1></div><span id="status">demo ready</span></header>
      <form id="keyForm" class="key-form"><input id="apiKeyInput" type="password" autocomplete="off" placeholder="Optional OpenAI API key for real AI mode"><button type="submit">Use Key</button></form>
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="chatForm" class="chat-form"><input id="userInput" autocomplete="off" placeholder="Ask about plants, watering, soil, or garden plans..."><button id="sendButton" type="submit">Send</button></form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
