<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClaimGuard AI Revenue Integrity Copilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-product="premium-ai-chatbot">
  <main class="workspace">
    <section class="hero">
      <img src="cover.svg" alt="ClaimGuard AI Revenue Integrity Copilot cover">
      <div><p>Medical Coding</p><h1>ClaimGuard AI Revenue Integrity Copilot</h1><span>$1,200/month clinic pilot</span></div>

  <script>window.sampleData = "Patient follow-up for diabetes and hypertension. Medication adjusted. A1C reviewed. Foot exam discussed but not documented as completed.";</script>
  <script src="script.js"></script>
