<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forest Ranger Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="chat-panel" aria-label="Forest Ranger Chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Trail station</p>
          <h1>Forest Ranger</h1>
        </div>
        <span id="status" class="status">online</span>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chatForm" class="chat-form">
        <input id="userInput" type="text" autocomplete="off" placeholder="Ask about trails, camping, or nature..." aria-label="Message">
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
