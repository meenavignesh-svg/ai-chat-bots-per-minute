<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Master Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="chat-panel" aria-label="Game Master Chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Quest table</p>
          <h1>Game Master</h1>
        </div>
        <span id="status" class="status">demo ready</span>
      </header>

      <form id="keyForm" class="key-form">
        <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Optional: enter OpenAI API key for real AI mode" aria-label="OpenAI API key">
        <button type="submit">Use Key</button>
      </form>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chatForm" class="chat-form">
        <input id="userInput" type="text" autocomplete="off" placeholder="Ask for quests, NPCs, puzzles, or encounters..." aria-label="Message">
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
