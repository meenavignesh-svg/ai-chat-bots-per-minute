<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moon Cafe Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="chat-panel" aria-label="Moon Cafe Chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Lunar station counter</p>
          <h1>Moon Cafe</h1>
        </div>
        <span class="status">open</span>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chatForm" class="chat-form">
        <input id="userInput" type="text" autocomplete="off" placeholder="Ask the barista..." aria-label="Message">
        <button type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
